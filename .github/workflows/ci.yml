name: Portfolio CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  qualidade-e-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Baixar o código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Instalar pnpm
        uses: pnpm/action-setup@v4

      - name: 🔌 Instalar dependências
        run: pnpm install

      - name: 🔎 Verificação de Tipagem (TypeScript)
        run: pnpm run check

      - name: 🏗️ Testar o Build (Gera os ficheiros estáticos)
        run: pnpm run build

# --- COMEÇAM OS PASSOS NOVOS DO PLAYWRIGHT ---
      - name: 🎭 Instalar Browsers do Playwright
        run: pnpm exec playwright install --with-deps

      - name: 🧪 Rodar Testes E2E (Playwright)
        run: pnpm exec playwright test

      # ESTE É O PASSO NOVO: Deploy para o Cloudflare
      - name: 🚀 Deploy para Cloudflare Pages
        uses: cloudflare/pages-action@v1
        # Só faz deploy se for um push direto na main (ignora se for apenas um PR de teste)
        if: github.ref == 'refs/heads/main'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'wagner-portfolio'
          directory: 'dist/public'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}